<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cámara de Admisión — Bellator</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Barlow+Semi+Condensed:wght@400;500;600&family=Teko:wght@400;500;600;700&display=swap');

    :root {
      --gold: #d4af37;
      --text: #eef4ff;
      --muted: rgba(238, 244, 255, 0.68);
      --line: rgba(255, 255, 255, 0.1);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
      color: var(--text);
      font-family: 'Barlow Semi Condensed', sans-serif;
    }

    body::before,
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      z-index: 2;
      pointer-events: none;
    }

    body::before {
      background:
        radial-gradient(circle at 50% 50%, rgba(125, 181, 255, 0.04), transparent 34%),
        radial-gradient(circle at 50% 50%, rgba(212, 175, 55, 0.05), transparent 58%);
      mix-blend-mode: screen;
    }

    body::after {
      background:
        linear-gradient(180deg, rgba(0, 0, 0, 0.16), rgba(0, 0, 0, 0.02) 30%, rgba(0, 0, 0, 0.24) 100%),
        radial-gradient(circle at center, transparent 0%, transparent 56%, rgba(0, 0, 0, 0.24) 100%);
    }

    #scene {
      position: fixed;
      inset: 0;
      z-index: 1;
      display: block;
    }

    /* ── EXAM WRAP ── */
    .exam-wrap{
      position:fixed;inset:0;z-index:4;
      display:flex;align-items:center;justify-content:center;
      pointer-events:none;
      padding:16px;
    }
    .exam-card{
      pointer-events:auto;
      width:100%;max-width:660px;
      background:rgba(7,11,18,.84);
      border:1px solid rgba(212,175,55,.22);
      border-radius:22px;
      backdrop-filter:blur(18px);
      box-shadow:0 24px 80px rgba(0,0,0,.55),0 0 0 1px rgba(255,255,255,.04);
      padding:26px 28px 28px;
      animation:cardIn .5s cubic-bezier(.2,1,.22,1) both;
      max-height:calc(100vh - 32px);
      overflow-y:auto;
    }
    @keyframes cardIn{
      from{opacity:0;transform:translateY(18px) scale(.97)}
      to{opacity:1;transform:none}
    }
    /* header */
    .exam-header{
      display:flex;align-items:center;justify-content:space-between;
      margin-bottom:22px;
    }
    .exam-logo{
      font-family:'Teko',sans-serif;font-size:1rem;letter-spacing:3px;
      color:var(--gold);text-transform:uppercase;
    }
    .exam-phase-bar{display:flex;align-items:center;gap:10px}
    .exam-phase{
      font-family:'Teko',sans-serif;font-size:.72rem;letter-spacing:2px;
      color:var(--gold);text-transform:uppercase;
      padding:3px 10px;border-radius:99px;
      border:1px solid rgba(212,175,55,.35);
      background:rgba(212,175,55,.07);
      transition:all .3s;
    }
    .exam-phase.inactive{
      color:rgba(238,244,255,.28);
      border-color:rgba(255,255,255,.08);
      background:transparent;
    }
    .exam-ph-sep{width:28px;height:1px;background:rgba(255,255,255,.12)}
    /* quiz */
    .q-meta{
      display:flex;justify-content:space-between;align-items:center;
      margin-bottom:8px;
    }
    .q-meta span{
      font-family:'Teko',sans-serif;font-size:.75rem;letter-spacing:2px;
      color:rgba(238,244,255,.45);text-transform:uppercase;
    }
    #qScore{color:var(--gold)!important}
    .q-prog{
      height:3px;border-radius:99px;
      background:rgba(255,255,255,.07);
      margin-bottom:20px;overflow:hidden;
    }
    .q-prog>div{
      height:100%;border-radius:99px;
      background:linear-gradient(90deg,var(--gold),#f3e68a);
      transition:width .45s cubic-bezier(.2,1,.22,1);
      width:0%;
    }
    .q-text{
      font-size:1.05rem;line-height:1.55;color:var(--text);
      margin-bottom:18px;min-height:52px;
    }
    .q-opts{display:flex;flex-direction:column;gap:9px;margin-bottom:18px}
    .q-opt{
      background:rgba(255,255,255,.03);
      border:1px solid rgba(255,255,255,.1);
      border-radius:10px;padding:11px 15px;
      color:var(--text);font-size:.92rem;line-height:1.4;
      cursor:pointer;text-align:left;
      transition:all .18s;letter-spacing:.2px;
    }
    .q-opt:hover:not([disabled]){border-color:rgba(212,175,55,.45);background:rgba(212,175,55,.05)}
    .q-opt.correct{
      border-color:#3fb950!important;background:rgba(63,185,80,.1)!important;
      color:#3fb950!important;
    }
    .q-opt.wrong{
      border-color:#ef4444!important;background:rgba(239,68,68,.08)!important;
      color:#ef4444!important;
    }
    .q-opt.reveal{border-color:#3fb950;background:rgba(63,185,80,.06);color:#3fb950}
    .q-feedback{
      font-size:.8rem;line-height:1.6;color:var(--muted);
      min-height:22px;margin-bottom:14px;padding:0 4px;
    }
    .q-feedback.ok{color:#3fb950}
    .q-feedback.no{color:#ef4444}
    /* combat */
    .c-title{
      font-family:'Teko',sans-serif;font-size:1.15rem;letter-spacing:2px;
      color:var(--gold);text-transform:uppercase;margin-bottom:5px;
    }
    .c-brief{font-size:.82rem;color:var(--muted);line-height:1.5;margin-bottom:16px}
    .c-rules{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:14px}
    .c-rule{
      font-size:.7rem;letter-spacing:.8px;padding:4px 11px;
      border-radius:99px;border:1px solid rgba(255,255,255,.1);
      background:rgba(255,255,255,.03);color:rgba(238,244,255,.45);
      transition:all .3s;
    }
    .c-rule.ok{border-color:rgba(63,185,80,.4);background:rgba(63,185,80,.07);color:#3fb950}
    .c-rule.fail{border-color:rgba(239,68,68,.4);background:rgba(239,68,68,.07);color:#ef4444}
    .c-textarea{
      width:100%;min-height:140px;resize:vertical;
      background:rgba(0,0,0,.35);border:1px solid rgba(255,255,255,.1);
      border-radius:12px;color:var(--text);
      font-family:'Barlow Semi Condensed',sans-serif;font-size:.93rem;
      line-height:1.65;padding:13px 15px;
      outline:none;box-sizing:border-box;transition:border-color .2s;
    }
    .c-textarea:focus{border-color:rgba(212,175,55,.35)}
    .c-counter{font-size:.72rem;color:var(--muted);text-align:right;margin:5px 0 14px;letter-spacing:.5px}
    /* timer bar */
    .q-timer-wrap{margin-bottom:14px;position:relative}
    .q-timer-bar{height:3px;border-radius:99px;background:rgba(255,255,255,.07);overflow:hidden;margin-bottom:4px}
    .q-timer-fill{height:100%;border-radius:99px;background:linear-gradient(90deg,#3fb950,var(--gold));
      transition:width .85s linear,background .5s;width:100%}
    .q-timer-fill.warn{background:linear-gradient(90deg,#f59e0b,#ef4444)!important}
    .q-timer-row{display:flex;justify-content:space-between;align-items:center}
    .q-timer-label{font-family:'Teko',sans-serif;font-size:.68rem;letter-spacing:2px;
      color:rgba(238,244,255,.35);text-transform:uppercase}
    .q-timer-val{font-family:'Teko',sans-serif;font-size:.8rem;letter-spacing:1px;color:var(--gold);
      transition:color .3s}
    .q-timer-val.warn{color:#ef4444!important}
    /* ortografía flags */
    .c-ortho{font-size:.72rem;color:#f59e0b;margin:4px 0 10px;min-height:16px;line-height:1.4}
    /* result */
    .res-icon{font-size:2.8rem;text-align:center;margin-bottom:10px}
    .res-title{
      font-family:'Teko',sans-serif;font-size:1.7rem;letter-spacing:2px;
      text-align:center;text-transform:uppercase;margin-bottom:6px;
    }
    .res-sub{font-size:.88rem;color:var(--muted);text-align:center;line-height:1.6;margin-bottom:12px}
    .res-score{font-family:'Teko',sans-serif;font-size:1rem;letter-spacing:2px;text-align:center;color:var(--gold);margin-bottom:20px}
    .res-actions{display:flex;gap:10px;justify-content:center;flex-wrap:wrap}
    /* shared button */
    .exam-btn{
      display:block;width:100%;
      padding:12px 20px;border-radius:99px;border:0;cursor:pointer;
      background:linear-gradient(135deg,var(--gold),#f3e68a);
      color:#07100d;font-family:'Teko',sans-serif;font-size:1rem;
      letter-spacing:2.5px;text-transform:uppercase;
      box-shadow:0 8px 28px rgba(212,175,55,.22);transition:all .2s;
    }
    .exam-btn:hover:not([disabled]){transform:translateY(-2px);box-shadow:0 12px 36px rgba(212,175,55,.32)}
    .exam-btn[disabled]{opacity:.35;cursor:default}
    @media(max-width:600px){
      .exam-card{padding:18px 16px 20px;border-radius:16px}
    }

    /* ── Intro / Resultado ── */
    .intro-wrap{
      position:fixed;inset:0;z-index:4;
      display:flex;align-items:center;justify-content:center;
      pointer-events:none;padding:16px;
    }
    .intro-card{
      pointer-events:auto;
      width:100%;max-width:540px;
      background:rgba(7,11,18,.84);
      border:1px solid rgba(212,175,55,.22);
      border-radius:22px;
      backdrop-filter:blur(18px);
      box-shadow:0 24px 80px rgba(0,0,0,.55),0 0 0 1px rgba(255,255,255,.04);
      padding:38px 36px 36px;
      text-align:center;
      animation:cardIn .6s cubic-bezier(.2,1,.22,1) both;
    }
    @keyframes cardIn{
      from{opacity:0;transform:translateY(22px) scale(.97)}
      to{opacity:1;transform:none}
    }
    .intro-icon{font-size:2.6rem;margin-bottom:12px}
    .intro-title{
      font-family:'Teko',sans-serif;font-size:2rem;letter-spacing:4px;
      text-transform:uppercase;color:var(--gold);margin-bottom:8px;
    }
    .intro-sub{font-size:.88rem;color:var(--muted);line-height:1.75;margin-bottom:28px}
    .intro-btn{
      display:inline-block;text-decoration:none;
      padding:13px 36px;border-radius:99px;border:0;cursor:pointer;
      background:linear-gradient(135deg,var(--gold),#f3e68a);
      color:#07100d;font-family:'Teko',sans-serif;font-size:1.05rem;
      letter-spacing:2.5px;text-transform:uppercase;
      box-shadow:0 8px 28px rgba(212,175,55,.22);transition:all .2s;
    }
    .intro-btn:hover{transform:translateY(-2px);box-shadow:0 12px 36px rgba(212,175,55,.32)}
    /* result inside intro-card */
    .res-icon2{font-size:2.8rem;margin-bottom:10px}
    .res-title2{
      font-family:'Teko',sans-serif;font-size:1.8rem;letter-spacing:3px;
      text-transform:uppercase;margin-bottom:6px;
    }
    .res-sub2{font-size:.88rem;color:var(--muted);line-height:1.6;margin-bottom:10px}
    .res-score2{font-family:'Teko',sans-serif;font-size:1rem;letter-spacing:2px;color:var(--gold);margin-bottom:20px}
    .res-acts{display:flex;gap:10px;justify-content:center;flex-wrap:wrap}
    .res-btn{
      display:inline-block;text-align:center;text-decoration:none;
      padding:11px 22px;border-radius:99px;border:0;cursor:pointer;
      font-family:'Teko',sans-serif;font-size:.9rem;
      letter-spacing:2px;text-transform:uppercase;transition:all .2s;
    }
    .res-btn:hover{transform:translateY(-2px)}
    .res-btn-green{background:linear-gradient(135deg,#3fb950,#72d97f);color:#04120a;box-shadow:0 8px 24px rgba(63,185,80,.22)}
    .res-btn-gold{background:linear-gradient(135deg,var(--gold),#f3e68a);color:#07100d;box-shadow:0 8px 24px rgba(212,175,55,.22)}
    .res-btn-ghost{border:1px solid rgba(212,175,55,.3);color:var(--gold)}
    .res-btn-muted{border:1px solid rgba(255,255,255,.12);color:rgba(238,244,255,.55)}
    @media(max-width:600px){.intro-card{padding:24px 18px 26px;border-radius:16px}}
  </style>
</head>
<body>
  <canvas id="scene"></canvas>

  <div class="intro-wrap">
    <div class="intro-card" id="introCard"></div>
  </div>

  <script type="module">
    import * as THREE from 'https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js';

    const isLowPowerDevice = (navigator.hardwareConcurrency && navigator.hardwareConcurrency <= 4) || window.innerWidth < 820;

    const canvas = document.getElementById('scene');
    const renderer = new THREE.WebGLRenderer({
      canvas,
      antialias: !isLowPowerDevice,
      alpha: false,
      powerPreference: 'high-performance'
    });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, isLowPowerDevice ? 1.5 : 2));
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setClearColor(0x000000, 1);

    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.001, 1000);
    const cameraBaseY = 1;
    let cameraTargetZ = 1.15;
    camera.position.set(0, cameraBaseY, cameraTargetZ);
    camera.lookAt(0, 0, 0);

    const clock = new THREE.Clock();
    const group = new THREE.Group();
    scene.add(group);
    scene.add(new THREE.AmbientLight(0xffffff, 1.15));

    const raycaster = new THREE.Raycaster();
    const pointer = new THREE.Vector2();
    const mousePoint = new THREE.Vector3(999, 999, 999);
    const mouseTarget = new THREE.Vector3(999, 999, 999);
    const interactionPlane = new THREE.Mesh(
      new THREE.PlaneGeometry(10, 10, 10, 10).rotateX(-Math.PI / 2),
      new THREE.MeshBasicMaterial({ visible: false })
    );
    scene.add(interactionPlane);

    function makeParticleTexture() {
      const textureCanvas = document.createElement('canvas');
      textureCanvas.width = 128;
      textureCanvas.height = 128;
      const ctx = textureCanvas.getContext('2d');
      const gradient = ctx.createRadialGradient(64, 64, 2, 64, 64, 64);
      gradient.addColorStop(0, 'rgba(255,255,255,1)');
      gradient.addColorStop(0.16, 'rgba(255,255,255,1)');
      gradient.addColorStop(0.4, 'rgba(255,255,255,0.5)');
      gradient.addColorStop(0.62, 'rgba(255,255,255,0.15)');
      gradient.addColorStop(1, 'rgba(255,255,255,0)');
      ctx.fillStyle = gradient;
      ctx.fillRect(0, 0, 128, 128);
      const texture = new THREE.CanvasTexture(textureCanvas);
      texture.needsUpdate = true;
      return texture;
    }

    const particleTexture = makeParticleTexture();
    const palette = ['#f7b373', '#88b3ce', '#ce9dcf'];
    const layers = [
      { count: isLowPowerDevice ? 7200 : 10000, minRadius: 0.42, maxRadius: 2.45, size: 0.86, amp: 1.0 },
      { count: isLowPowerDevice ? 7200 : 10000, minRadius: 0.58, maxRadius: 2.22, size: 0.52, amp: 2.8 },
      { count: isLowPowerDevice ? 7200 : 10000, minRadius: 0.52, maxRadius: 2.36, size: 0.52, amp: 1.9 }
    ];
    const meshes = [];
    const baseRotations = [];

    function makeGalaxyLayer(options, colorHex, index) {
      const geometry = new THREE.BufferGeometry();
      const positions = new Float32Array(options.count * 3);
      const scales = new Float32Array(options.count);
      const randomness = new Float32Array(options.count * 3);

      for (let i = 0; i < options.count; i++) {
        const i3 = i * 3;
        const angle = Math.random() * Math.PI * 2;
        const radius = THREE.MathUtils.lerp(options.minRadius, options.maxRadius, Math.random());
        positions[i3 + 0] = Math.sin(angle) * radius;
        positions[i3 + 1] = (Math.random() - 0.5) * 0.2;
        positions[i3 + 2] = Math.cos(angle) * radius;
        scales[i] = Math.random();
        randomness[i3 + 0] = (Math.random() - 0.5) * 0.05;
        randomness[i3 + 1] = (Math.random() - 0.5) * 0.04;
        randomness[i3 + 2] = (Math.random() - 0.5) * 0.05;
      }

      geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
      geometry.setAttribute('aScale', new THREE.BufferAttribute(scales, 1));
      geometry.setAttribute('aRandom', new THREE.BufferAttribute(randomness, 3));

      const material = new THREE.ShaderMaterial({
        transparent: true,
        depthWrite: false,
        blending: THREE.AdditiveBlending,
        uniforms: {
          uTime: { value: 0 },
          uAmp: { value: options.amp },
          uColor: { value: new THREE.Color(colorHex) },
          uPixelRatio: { value: renderer.getPixelRatio() },
          uMouse: { value: mousePoint.clone() },
          uTexture: { value: particleTexture },
          uSize: { value: options.size }
        },
        vertexShader: `
          uniform float uTime;
          uniform float uAmp;
          uniform float uPixelRatio;
          uniform vec3 uMouse;
          uniform float uSize;
          attribute float aScale;
          attribute vec3 aRandom;
          varying float vStrength;

          mat3 rotation3dY(float angle) {
            float s = sin(angle);
            float c = cos(angle);
            return mat3(c, 0.0, -s, 0.0, 1.0, 0.0, s, 0.0, c);
          }

          float saturate(float x) {
            return clamp(x, 0.0, 1.0);
          }

          void main() {
            vec3 p = position;
            float particleSize = aScale * 0.5 + 0.5;
            vec3 worldPos = rotation3dY(uTime * 0.3 * (0.1 + 0.5 * particleSize)) * p;
            worldPos += aRandom * (0.8 + uAmp * 0.08);
            worldPos.y += sin(uTime * 0.7 + length(p.xz) * 3.0 + aRandom.y * 9.0) * 0.04 * uAmp;

            float distToMouse = pow(1.0 - saturate(length(uMouse.xz - worldPos.xz) - 0.1), 4.0);
            vec3 dir = worldPos - uMouse;
            worldPos = mix(worldPos, uMouse + normalize(dir + vec3(0.0001)) * 0.12, distToMouse);

            vec4 mvPosition = modelViewMatrix * vec4(worldPos, 1.0);
            gl_Position = projectionMatrix * mvPosition;
            gl_PointSize = (10.0 + 12.0 * particleSize) * uSize * uPixelRatio * (1.0 / -mvPosition.z);
            vStrength = 0.45 + particleSize * 0.55;
          }
        `,
        fragmentShader: `
          uniform vec3 uColor;
          uniform sampler2D uTexture;
          varying float vStrength;
          void main() {
            vec4 tex = texture2D(uTexture, gl_PointCoord);
            gl_FragColor = vec4(uColor, tex.r * (0.58 + vStrength * 0.6));
          }
        `
      });

      const points = new THREE.Points(geometry, material);
      points.rotation.x = -0.28;
      group.add(points);
      meshes.push(points);
      baseRotations.push(points.rotation.x);
    }

    layers.forEach((layer, index) => makeGalaxyLayer(layer, palette[index], index));

    const blackHole = new THREE.Mesh(
      new THREE.SphereGeometry(0.24, 48, 48),
      new THREE.MeshBasicMaterial({ color: 0x020202 })
    );
    group.add(blackHole);

    const accretionRing = new THREE.Mesh(
      new THREE.TorusGeometry(0.34, 0.035, 18, 160),
      new THREE.MeshBasicMaterial({ color: 0xf3c876, transparent: true, opacity: 0.22 })
    );
    accretionRing.rotation.x = Math.PI * 0.5;
    group.add(accretionRing);

    const eventHorizonGlow = new THREE.Mesh(
      new THREE.RingGeometry(0.28, 0.5, 96),
      new THREE.MeshBasicMaterial({ color: 0x6ea8ff, transparent: true, opacity: 0.08, side: THREE.DoubleSide })
    );
    eventHorizonGlow.rotation.x = Math.PI * 0.5;
    group.add(eventHorizonGlow);

    const dustGeometry = new THREE.BufferGeometry();
    const dustCount = isLowPowerDevice ? 700 : 1200;
    const dustPositions = new Float32Array(dustCount * 3);
    for (let i = 0; i < dustCount; i++) {
      const i3 = i * 3;
      dustPositions[i3 + 0] = (Math.random() - 0.5) * 26;
      dustPositions[i3 + 1] = (Math.random() - 0.5) * 18;
      dustPositions[i3 + 2] = (Math.random() - 0.5) * 20;
    }
    dustGeometry.setAttribute('position', new THREE.BufferAttribute(dustPositions, 3));
    const dustMaterial = new THREE.PointsMaterial({
      color: 0xa2bde0,
      size: 0.018,
      transparent: true,
      opacity: 0.24,
      blending: THREE.AdditiveBlending,
      depthWrite: false
    });
    const dust = new THREE.Points(dustGeometry, dustMaterial);
    scene.add(dust);

    window.addEventListener('pointermove', (event) => {
      pointer.x = (event.clientX / window.innerWidth) * 2 - 1;
      pointer.y = -(event.clientY / window.innerHeight) * 2 + 1;
      raycaster.setFromCamera(pointer, camera);
      const intersects = raycaster.intersectObject(interactionPlane);
      if (intersects[0]) {
        mouseTarget.copy(intersects[0].point);
      }
    });

    window.addEventListener('wheel', (event) => {
      event.preventDefault();
      cameraTargetZ += event.deltaY * 0.0012;
      cameraTargetZ = THREE.MathUtils.clamp(cameraTargetZ, 0.75, 2.15);
    }, { passive: false });

    window.addEventListener('resize', () => {
      renderer.setSize(window.innerWidth, window.innerHeight);
      renderer.setPixelRatio(Math.min(window.devicePixelRatio, isLowPowerDevice ? 1.5 : 2));
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      meshes.forEach((mesh) => {
        mesh.material.uniforms.uPixelRatio.value = renderer.getPixelRatio();
      });
    });

    function animate() {
      const elapsed = clock.getElapsedTime();
      mousePoint.lerp(mouseTarget, 0.08);
      camera.position.z += (cameraTargetZ - camera.position.z) * 0.08;
      camera.position.y = cameraBaseY + Math.sin(elapsed * 0.08) * 0.015;
      camera.lookAt(0, 0, 0);

      group.rotation.y = elapsed * 0.03;
      group.rotation.z = Math.sin(elapsed * 0.12) * 0.03;
      accretionRing.rotation.z = elapsed * 0.4;
      eventHorizonGlow.rotation.z = -elapsed * 0.22;
      dust.rotation.y = elapsed * 0.01;

      meshes.forEach((mesh, index) => {
        mesh.material.uniforms.uTime.value = elapsed * (0.75 + index * 0.08);
        mesh.material.uniforms.uMouse.value.copy(mousePoint);
        mesh.rotation.y = elapsed * (0.05 + index * 0.015);
        mesh.rotation.x = baseRotations[index] + Math.sin(elapsed * 0.2 + index) * 0.02;
      });

      renderer.render(scene, camera);
      requestAnimationFrame(animate);
    }
    animate();

    /* ── Post-exam result / intro ── */
    (function() {
      let result = null, division = 'Ciudad', retryUrl = '/examen';
      try {
        const rc = sessionStorage.getItem('bellator_exam_result');
        const ru = sessionStorage.getItem('bellator_exam_result_universal');
        if (rc) { result = JSON.parse(rc); sessionStorage.removeItem('bellator_exam_result'); division = 'Ciudad'; retryUrl = '/examen'; }
        else if (ru) { result = JSON.parse(ru); sessionStorage.removeItem('bellator_exam_result_universal'); division = 'Universal · 3-A'; retryUrl = '/examen-universal'; }
      } catch(e) {}
      const card = document.getElementById('introCard');

      if (result) {
        const p = result.passed;
        const reason = result.reason || result.reg_error || ('No alcanzaste el mínimo de 7/10 en teoría. Repasá el reglamento y volvé a intentarlo.');
        const successCopy = result.reg_status
          ? ('Prueba superada. ' + result.reg_status + '.')
          : ('Superaste la prueba teórica y tu turno de combate es técnicamente válido para División ' + division + '.');
        card.innerHTML =
          '<div class="res-icon2">' + (p ? (division.includes('Universal') ? '🌌' : '🏆') : '⚔') + '</div>' +
          '<div class="res-title2" style="color:' + (p ? '#3fb950' : '#f59e0b') + '">' + (p ? '¡ADMITIDO!' : 'INSUFICIENTE') + '</div>' +
          '<div class="res-sub2">' + (p ? successCopy : reason) + '</div>' +
          '<div class="res-score2">TEORÍA: ' + result.score + ' / ' + result.total + (p ? '  ·  COMBATE: APROBADO' : '') + '</div>' +
          '<div class="res-acts">' +
            (p ? '<a href="/competidores" class="res-btn res-btn-green">VER ASPIRANTES →</a>' : '<a href="' + retryUrl + '" class="res-btn res-btn-gold">↺ REINTENTAR EXAMEN →</a>') +
            '<a href="/registro" class="res-btn res-btn-gold">IR AL LOBBY →</a>' +
            '<a href="/reglamento" class="res-btn res-btn-ghost">VER REGLAMENTO</a>' +
            '<a href="/" class="res-btn res-btn-muted">INICIO</a>' +
          '</div>';
      } else {
        card.innerHTML =
          '<div class="intro-icon">⚔</div>' +
          '<div class="intro-title">Cámara de Admisión</div>' +
          '<div class="intro-sub">La prueba normalmente se inicia desde el centro de registro.<br>También tenés accesos directos al lobby y a los exámenes para pruebas rápidas.</div>' +
          '<div style="display:flex;flex-direction:column;gap:10px;margin-top:4px">' +
            '<a href="/registro" class="intro-btn">IR AL LOBBY →</a>' +
            '<a href="/examen" class="intro-btn" style="background:rgba(255,255,255,.04);color:var(--text);border:1px solid rgba(255,255,255,.14);box-shadow:none">EXAMEN CIUDAD DIRECTO →</a>' +
            '<a href="/examen-universal" class="intro-btn" style="background:linear-gradient(135deg,#7c6ab5,#a890e0);box-shadow:0 8px 28px rgba(124,106,181,.3)">EXAMEN UNIVERSAL DIRECTO →</a>' +
            '<a href="/reglamento" class="intro-btn" style="background:rgba(255,255,255,.04);color:var(--text);border:1px solid rgba(255,255,255,.14);box-shadow:none">VER REGLAMENTO →</a>' +
          '</div>';
      }
    })();
  </script>
<script src="/translate.js?v=4"></script>
</body>
</html>
