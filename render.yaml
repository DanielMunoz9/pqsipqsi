services:
  - type: web
    name: valhala
    runtime: docker
    dockerfilePath: ./Dockerfile
    port: 8080
    envVars:
      - key: PORT
        value: 8080
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_KEY
        sync: false
      - key: JWT_SECRET
        generateValue: true